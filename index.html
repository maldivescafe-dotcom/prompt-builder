<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>画像プロンプトビルダー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0a1e;color:#e8e0ff;min-height:100vh;-webkit-text-size-adjust:100%;text-size-adjust:100%}
.header{background:linear-gradient(135deg,#1a0a3e 0%,#2d1060 100%);padding:20px 16px 16px;text-align:center;border-bottom:1px solid #3d2080}
.header h1{font-size:1.4rem;font-weight:700;color:#c9b8ff;letter-spacing:.05em}
.header p{font-size:.78rem;color:#9980cc;margin-top:4px}
.tabs{display:flex;background:#0d0820;border-bottom:1px solid #2d1a5e;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{flex:1;min-width:72px;padding:12px 8px;font-size:.75rem;color:#7060a8;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;font-weight:500}
.tab-btn.active{color:#c9b8ff;border-bottom-color:#8b5cf6;background:#120d2a}
.tab-btn:hover:not(.active){color:#a090d0;background:#110c25}
.multi-hint{font-size:.7rem;color:#6a5a90;text-align:center;padding:6px 0 2px;letter-spacing:.02em}
.main{padding:14px 12px;max-width:640px;margin:0 auto}
.section{margin-bottom:14px}
.section-label{font-size:.72rem;color:#8b7ab8;margin-bottom:6px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.btn-group{display:flex;flex-wrap:wrap;gap:6px}
.opt-btn{padding:6px 12px;font-size:.8rem;border-radius:20px;border:1px solid #3d2a70;background:#1a1040;color:#b0a0e0;cursor:pointer;transition:all .2s;line-height:1.3}
.opt-btn:hover{border-color:#7c3aed;color:#e0d0ff;background:#211355}
.opt-btn.selected{background:#5b21b6;border-color:#8b5cf6;color:#fff;font-weight:600}
.prompt-area{margin-top:18px;background:#0d0820;border:1px solid #3d2a70;border-radius:12px;padding:14px}
.prompt-label{font-size:.72rem;color:#8b7ab8;margin-bottom:8px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.prompt-label span{font-size:.65rem;background:#2d1a5e;padding:2px 7px;border-radius:10px;color:#a090d0;text-transform:none;letter-spacing:0}
.prompt-text{font-size:.85rem;color:#d4c8f8;line-height:1.6;min-height:60px;word-break:break-word;background:#13092e;border-radius:8px;padding:10px 12px;border:1px solid #2d1a5e;font-family:monospace}
.prompt-empty{color:#5a4a80;font-style:italic;font-size:.82rem}
.btn-row{display:flex;gap:8px;margin-top:10px}
.action-btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
.copy-btn{background:linear-gradient(135deg,#6d28d9,#8b5cf6);color:#fff}
.copy-btn:hover{background:linear-gradient(135deg,#5b21b6,#7c3aed)}
.copy-btn.copied{background:linear-gradient(135deg,#065f46,#059669)}
.reset-btn{background:#1e1040;color:#9080c0;border:1px solid #3d2a70;flex:none;padding:10px 16px}
.reset-btn:hover{background:#2d1a5e;color:#c0b0e0}
.extra-row{margin-bottom:14px}
.extra-input{width:100%;padding:8px 12px;background:#13092e;border:1px solid #2d1a5e;border-radius:8px;color:#d4c8f8;font-size:.82rem;outline:none;transition:border .2s}
.extra-input::placeholder{color:#5a4a80}
.extra-input:focus{border-color:#6d28d9}
.extra-label{font-size:.72rem;color:#8b7ab8;margin-bottom:6px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.quality-row{margin-top:14px}
.divider{height:1px;background:#1e1440;margin:14px 0}
.inline-input{width:100%;margin-top:5px;padding:4px 10px;background:#0d0820;border:1px solid #2a1a50;border-radius:6px;color:#c0b0e8;font-size:.74rem;outline:none;transition:border .2s}
.inline-input::placeholder{color:#4a3a68;font-size:.72rem}
.inline-input:focus{border-color:#6d28d9}
</style>
</head>
<body>

<div class="header">
  <h1>🎨 画像プロンプトビルダー</h1>
  <p>Grok Imagine / Stable Diffusion 用プロンプト生成ツール</p>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('portrait')">👤 ポートレート</button>
  <button class="tab-btn" onclick="switchTab('poster')">🎭 イベントポスター</button>
  <button class="tab-btn" onclick="switchTab('landscape')">🌿 風景・自然</button>
  <button class="tab-btn" onclick="switchTab('fantasy')">⚔️ ファンタジー</button>
</div>
<div class="multi-hint">各項目は複数選択できます</div>

<div class="main">

  <!-- ポートレート -->
  <div id="tab-portrait">
    <div class="section">
      <div class="section-label">性別・年齢</div>
      <div class="btn-group" data-group="p_subject" data-multi="true">
        <button class="opt-btn" data-val="young woman">若い女性</button>
        <button class="opt-btn" data-val="young man">若い男性</button>
        <button class="opt-btn" data-val="child">子供</button>
        <button class="opt-btn" data-val="adult woman">大人の女性</button>
        <button class="opt-btn" data-val="adult man">大人の男性</button>
        <button class="opt-btn" data-val="elderly person">お年寄り</button>
      </div>
      <input class="inline-input" id="extra_p_subject" placeholder="その他（例: twins, pregnant woman...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">年齢</div>
      <div class="btn-group" data-group="p_age" data-multi="true">
        <button class="opt-btn" data-val="late teens">10代後半</button>
        <button class="opt-btn" data-val="20 years old">20歳</button>
        <button class="opt-btn" data-val="in their twenties">20代</button>
        <button class="opt-btn" data-val="in their thirties">30代</button>
        <button class="opt-btn" data-val="in their forties">40代</button>
        <button class="opt-btn" data-val="in their fifties, mature">50代以上</button>
      </div>
      <input class="inline-input" id="extra_p_age" placeholder="その他（例: 25 years old...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">人種・国籍</div>
      <div class="btn-group" data-group="p_ethnicity" data-multi="true">
        <button class="opt-btn" data-val="Japanese, East Asian facial features">日本人</button>
        <button class="opt-btn" data-val="East Asian appearance">アジア系</button>
        <button class="opt-btn" data-val="Southeast Asian appearance">東南アジア系</button>
        <button class="opt-btn" data-val="Caucasian, Western European appearance">西洋系（白人）</button>
        <button class="opt-btn" data-val="Black, African appearance">黒人系</button>
        <button class="opt-btn" data-val="Latino, Latin American appearance">ラテン系</button>
        <button class="opt-btn" data-val="mixed ethnicity, multiracial appearance">混血・ハーフ</button>
      </div>
      <input class="inline-input" id="extra_p_ethnicity" placeholder="その他（例: Scandinavian, Middle Eastern...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">服装</div>
      <div class="btn-group" data-group="p_outfit" data-multi="true">
        <button class="opt-btn" data-val="casual T-shirt, casual wear">Tシャツ・カジュアル</button>
        <button class="opt-btn" data-val="elegant dress">ドレス</button>
        <button class="opt-btn" data-val="formal suit">スーツ・フォーマル</button>
        <button class="opt-btn" data-val="kimono, Japanese traditional clothing">着物・和服</button>
        <button class="opt-btn" data-val="school uniform, sailor uniform">制服・セーラー服</button>
        <button class="opt-btn" data-val="jacket, coat, outerwear">コート・ジャケット</button>
        <button class="opt-btn" data-val="sleeveless top, tank top">ノースリーブ</button>
        <button class="opt-btn" data-val="white medical coat, nurse uniform">白衣・ナース服</button>
        <button class="opt-btn" data-val="sportswear, athletic wear">スポーツウェア</button>
        <button class="opt-btn" data-val="trendy modern Japanese youth fashion, stylish contemporary casual outfit">今どきの若い子の服</button>
      </div>
      <input class="inline-input" id="extra_p_outfit" placeholder="その他（例: red hoodie, floral skirt...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">動作・ポーズ</div>
      <div class="btn-group" data-group="p_action" data-multi="true">
        <button class="opt-btn" data-val="standing gracefully">立ち姿</button>
        <button class="opt-btn" data-val="sitting relaxed">座る</button>
        <button class="opt-btn" data-val="walking">歩く</button>
        <button class="opt-btn" data-val="running">走る</button>
        <button class="opt-btn" data-val="dancing">踊る</button>
        <button class="opt-btn" data-val="jumping joyfully">ジャンプ</button>
        <button class="opt-btn" data-val="meditating in lotus position, zen meditation pose">瞑想</button>
        <button class="opt-btn" data-val="doing a yoga pose, stretching">ヨガ・ストレッチ</button>
        <button class="opt-btn" data-val="praying with hands together">祈る</button>
        <button class="opt-btn" data-val="lying down, relaxed reclining pose">寝転ぶ</button>
        <button class="opt-btn" data-val="taking a shower, water droplets, wet hair">シャワー</button>
        <button class="opt-btn" data-val="bathing in a bathtub, relaxing bath scene">入浴</button>
      </div>
      <input class="inline-input" id="extra_p_action" placeholder="その他（例: cooking, reading a book, singing...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">雰囲気</div>
      <div class="btn-group" data-group="p_mood" data-multi="true">
        <button class="opt-btn" data-val="natural, soft expression">ナチュラル</button>
        <button class="opt-btn" data-val="cool, confident expression">クール</button>
        <button class="opt-btn" data-val="cute, cheerful expression">かわいい</button>
        <button class="opt-btn" data-val="elegant, graceful expression">エレガント</button>
        <button class="opt-btn" data-val="dark, intense expression">ダーク</button>
        <button class="opt-btn" data-val="mysterious, enigmatic expression">ミステリアス</button>
        <button class="opt-btn" data-val="blissful tantric atmosphere, sacred spiritual energy, serene sensual warmth">タントラ風</button>
        <button class="opt-btn" data-val="healing, peaceful, soothing atmosphere">癒やし・安らぎ</button>
      </div>
      <input class="inline-input" id="extra_p_mood" placeholder="その他（例: melancholic, joyful, fierce...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">感情・感覚</div>
      <div class="btn-group" data-group="p_feel" data-multi="true">
        <button class="opt-btn" data-val="blissful, pleasantly comfortable feeling">気持ち良い</button>
        <button class="opt-btn" data-val="blissful tantric atmosphere where souls feel each other's pleasant energy, sacred sensual connection">タントリックな気持ち良さ</button>
        <button class="opt-btn" data-val="entranced, dreamy rapturous expression">うっとり</button>
        <button class="opt-btn" data-val="euphoric happiness, overflowing joy">幸福感</button>
        <button class="opt-btn" data-val="deeply relaxed, serene, completely at ease">深いリラックス</button>
        <button class="opt-btn" data-val="liberating sense of freedom and openness">解放感</button>
        <button class="opt-btn" data-val="heart-fluttering excitement, sparkling emotion">ときめき</button>
        <button class="opt-btn" data-val="gentle warmth and tenderness">温もり</button>
        <button class="opt-btn" data-val="ecstatic, intoxicated with bliss">陶酔・恍惚</button>
        <button class="opt-btn" data-val="sacred awe, spiritually uplifted emotion">神聖な感動</button>
      </div>
      <input class="inline-input" id="extra_p_feel" placeholder="その他（例: nostalgic, healing warmth...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">構図</div>
      <div class="btn-group" data-group="p_comp" data-multi="true">
        <button class="opt-btn" data-val="bust-up portrait">バストアップ</button>
        <button class="opt-btn" data-val="full body shot">全身</button>
        <button class="opt-btn" data-val="close-up face shot">クローズアップ</button>
        <button class="opt-btn" data-val="three-quarter angle">斜め</button>
      </div>
      <input class="inline-input" id="extra_p_comp" placeholder="その他（例: from behind, bird's eye view...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">背景</div>
      <div class="btn-group" data-group="p_bg" data-multi="true">
        <button class="opt-btn" data-val="white studio background">白・グレー</button>
        <button class="opt-btn" data-val="lush forest background">自然・森</button>
        <button class="opt-btn" data-val="urban cityscape background">都市</button>
        <button class="opt-btn" data-val="cozy cafe interior background">カフェ・室内</button>
        <button class="opt-btn" data-val="golden sunset sky background">夕焼け空</button>
        <button class="opt-btn" data-val="sacred meditation room with candles and soft drapes, spiritual sanctuary interior">神聖な空間</button>
      </div>
      <input class="inline-input" id="extra_p_bg" placeholder="その他（例: cherry blossom park, beach...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">照明</div>
      <div class="btn-group" data-group="p_light" data-multi="true">
        <button class="opt-btn" data-val="natural soft lighting">自然光</button>
        <button class="opt-btn" data-val="professional studio lighting">スタジオ照明</button>
        <button class="opt-btn" data-val="golden hour sunlight">夕日・ゴールデンアワー</button>
        <button class="opt-btn" data-val="dramatic cinematic lighting">映画的・ドラマチック</button>
      </div>
      <input class="inline-input" id="extra_p_light" placeholder="その他（例: neon lights, candlelight...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">画風</div>
      <div class="btn-group" data-group="p_style" data-multi="true">
        <button class="opt-btn" data-val="photorealistic, hyperrealistic">写真リアル</button>
        <button class="opt-btn" data-val="digital art">デジタルアート</button>
        <button class="opt-btn" data-val="watercolor painting">水彩</button>
        <button class="opt-btn" data-val="anime style">アニメ風</button>
        <button class="opt-btn" data-val="manga style, comic style">漫画風</button>
        <button class="opt-btn" data-val="oil painting">油絵</button>
        <button class="opt-btn" data-val="Alphonse Mucha style, Art Nouveau">ミュシャ風</button>
      </div>
      <input class="inline-input" id="extra_p_style" placeholder="その他（例: ukiyo-e, impressionism...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">エフェクト</div>
      <div class="btn-group" data-group="p_fx" data-multi="true">
        <button class="opt-btn" data-val="glowing red light emanating from the root chakra at the base of the spine, ethereal energy glow">第1チャクラ光（赤・尾骨）</button>
        <button class="opt-btn" data-val="glowing orange light emanating from the sacral chakra below the navel, ethereal energy glow">第2チャクラ光（橙・丹田）</button>
        <button class="opt-btn" data-val="glowing golden yellow light emanating from the solar plexus chakra, ethereal energy glow">第3チャクラ光（黄・みぞおち）</button>
        <button class="opt-btn" data-val="glowing green light emanating from the heart chakra on the chest, ethereal energy glow">第4チャクラ光（緑・胸）</button>
        <button class="opt-btn" data-val="glowing blue light emanating from the throat chakra, ethereal energy glow">第5チャクラ光（青・喉）</button>
        <button class="opt-btn" data-val="glowing indigo light emanating from the third eye chakra on the forehead, ethereal energy glow">第6チャクラ光（藍・眉間）</button>
        <button class="opt-btn" data-val="glowing violet light emanating from the crown chakra above the head, ethereal energy glow">第7チャクラ光（紫・頭頂）</button>
        <button class="opt-btn" data-val="glowing aura surrounding the body, halo of light">オーラ・光の輪</button>
        <button class="opt-btn" data-val="falling flower petals, floral particles surrounding">花びら・花のエフェクト</button>
        <button class="opt-btn" data-val="golden dust particles, magical light specks floating">光の粒子・ほこり</button>
      </div>
      <input class="inline-input" id="extra_p_fx" placeholder="その他（例: smoke, sparkles, wings...）" oninput="buildPrompt()">
    </div>
  </div>

  <!-- イベントポスター -->
  <div id="tab-poster" style="display:none">
    <div class="section">
      <div class="section-label">イベント種類</div>
      <div class="btn-group" data-group="e_type" data-multi="true">
        <button class="opt-btn" data-val="concert music event poster">コンサート・音楽</button>
        <button class="opt-btn" data-val="movie theater stage performance poster">映画・舞台</button>
        <button class="opt-btn" data-val="art exhibition gallery poster">展覧会・アート</button>
        <button class="opt-btn" data-val="festival celebration poster">フェスティバル</button>
        <button class="opt-btn" data-val="sports event poster">スポーツ</button>
        <button class="opt-btn" data-val="party ceremony celebration poster">パーティー・祝典</button>
      </div>
      <input class="inline-input" id="extra_e_type" placeholder="その他（例: yoga class, book fair...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">雰囲気</div>
      <div class="btn-group" data-group="e_mood" data-multi="true">
        <button class="opt-btn" data-val="festive, vibrant, celebratory atmosphere">華やか・フェスタ</button>
        <button class="opt-btn" data-val="mysterious, dark, atmospheric mood">神秘的・ダーク</button>
        <button class="opt-btn" data-val="energetic, dynamic, powerful feeling">エネルギッシュ</button>
        <button class="opt-btn" data-val="elegant, luxurious, sophisticated tone">エレガント・高級感</button>
        <button class="opt-btn" data-val="pop art, casual, fun vibe">ポップ・カジュアル</button>
      </div>
      <input class="inline-input" id="extra_e_mood" placeholder="その他（例: nostalgic, dreamy...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">カラー</div>
      <div class="btn-group" data-group="e_color" data-multi="true">
        <button class="opt-btn" data-val="warm red orange color palette">暖色系（赤・オレンジ）</button>
        <button class="opt-btn" data-val="cool blue purple color palette">寒色系（青・紫）</button>
        <button class="opt-btn" data-val="monochrome black and white">モノクロ</button>
        <button class="opt-btn" data-val="gold champagne color palette">ゴールド・シャンパン</button>
        <button class="opt-btn" data-val="colorful neon vibrant palette">カラフル・ネオン</button>
      </div>
      <input class="inline-input" id="extra_e_color" placeholder="その他（例: pastel pink, deep navy...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">スタイル</div>
      <div class="btn-group" data-group="e_style" data-multi="true">
        <button class="opt-btn" data-val="modern minimalist design">モダン・ミニマル</button>
        <button class="opt-btn" data-val="retro vintage design">レトロ・ヴィンテージ</button>
        <button class="opt-btn" data-val="cyberpunk neon futuristic design">サイバーパンク</button>
        <button class="opt-btn" data-val="classical art decorative design">クラシック・アート</button>
        <button class="opt-btn" data-val="Japanese traditional aesthetic design">和風</button>
        <button class="opt-btn" data-val="Alphonse Mucha Art Nouveau style">ミュシャ風</button>
        <button class="opt-btn" data-val="manga comic illustration style">漫画風</button>
      </div>
      <input class="inline-input" id="extra_e_style" placeholder="その他（例: bauhaus, grunge...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">人物</div>
      <div class="btn-group" data-group="e_person" data-multi="true">
        <button class="opt-btn" data-val="featuring a beautiful woman">人物あり（女性）</button>
        <button class="opt-btn" data-val="featuring a man">人物あり（男性）</button>
        <button class="opt-btn" data-val="featuring multiple people">人物あり（複数）</button>
        <button class="opt-btn" data-val="no people, objects and typography only">人物なし</button>
      </div>
      <input class="inline-input" id="extra_e_person" placeholder="その他（例: silhouette of a dancer...）" oninput="buildPrompt()">
    </div>
  </div>

  <!-- 風景・自然 -->
  <div id="tab-landscape" style="display:none">
    <div class="section">
      <div class="section-label">場所</div>
      <div class="btn-group" data-group="l_place" data-multi="true">
        <button class="opt-btn" data-val="majestic mountain peaks landscape">山・峰</button>
        <button class="opt-btn" data-val="ocean beach shoreline scenery">海・ビーチ</button>
        <button class="opt-btn" data-val="lush dense forest scenery">森・林</button>
        <button class="opt-btn" data-val="urban city night skyline">都市・夜景</button>
        <button class="opt-btn" data-val="vast desert landscape">砂漠</button>
        <button class="opt-btn" data-val="outer space planets galaxies">宇宙・惑星</button>
      </div>
      <input class="inline-input" id="extra_l_place" placeholder="その他（例: rice terraces, lavender field...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">時間帯</div>
      <div class="btn-group" data-group="l_time" data-multi="true">
        <button class="opt-btn" data-val="dawn morning sunrise light">朝・夜明け</button>
        <button class="opt-btn" data-val="midday bright sunshine">昼・晴れ</button>
        <button class="opt-btn" data-val="golden sunset twilight">夕焼け</button>
        <button class="opt-btn" data-val="night moonlight scene">夜・月光</button>
      </div>
      <input class="inline-input" id="extra_l_time" placeholder="その他（例: blue hour, midnight...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">天気・効果</div>
      <div class="btn-group" data-group="l_weather" data-multi="true">
        <button class="opt-btn" data-val="clear blue sky">快晴</button>
        <button class="opt-btn" data-val="misty foggy atmosphere">霧・靄</button>
        <button class="opt-btn" data-val="rainy wet atmosphere">雨</button>
        <button class="opt-btn" data-val="snowy winter weather">雪</button>
        <button class="opt-btn" data-val="stormy dramatic clouds">嵐</button>
      </div>
      <input class="inline-input" id="extra_l_weather" placeholder="その他（例: rainbow, northern lights...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">季節</div>
      <div class="btn-group" data-group="l_season" data-multi="true">
        <button class="opt-btn" data-val="spring cherry blossom season">春・桜</button>
        <button class="opt-btn" data-val="summer lush greenery">夏・緑</button>
        <button class="opt-btn" data-val="autumn fall foliage colors">秋・紅葉</button>
        <button class="opt-btn" data-val="winter snowy scene">冬・雪</button>
      </div>
      <input class="inline-input" id="extra_l_season" placeholder="その他（例: rainy season, harvest time...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">画風</div>
      <div class="btn-group" data-group="l_style" data-multi="true">
        <button class="opt-btn" data-val="photorealistic photography">写真リアル</button>
        <button class="opt-btn" data-val="watercolor painting style">水彩</button>
        <button class="opt-btn" data-val="oil painting style">油絵</button>
        <button class="opt-btn" data-val="fantasy art style">ファンタジー風</button>
        <button class="opt-btn" data-val="Alphonse Mucha Art Nouveau style">ミュシャ風</button>
      </div>
      <input class="inline-input" id="extra_l_style" placeholder="その他（例: pixel art, concept art...）" oninput="buildPrompt()">
    </div>
  </div>

  <!-- ファンタジー -->
  <div id="tab-fantasy" style="display:none">
    <div class="section">
      <div class="section-label">世界観</div>
      <div class="btn-group" data-group="f_world" data-multi="true">
        <button class="opt-btn" data-val="medieval fantasy world setting">中世ファンタジー</button>
        <button class="opt-btn" data-val="Japanese fantasy world setting">和風ファンタジー</button>
        <button class="opt-btn" data-val="steampunk universe setting">スチームパンク</button>
        <button class="opt-btn" data-val="cyberpunk dystopian world setting">サイバーパンク</button>
        <button class="opt-btn" data-val="modern sci-fi setting">現代・SF</button>
      </div>
      <input class="inline-input" id="extra_f_world" placeholder="その他（例: underwater kingdom, post-apocalyptic...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">キャラクター</div>
      <div class="btn-group" data-group="f_char" data-multi="true">
        <button class="opt-btn" data-val="wizard witch mage character">魔法使い・魔女</button>
        <button class="opt-btn" data-val="knight warrior soldier character">騎士・戦士</button>
        <button class="opt-btn" data-val="elf fairy being character">エルフ・妖精</button>
        <button class="opt-btn" data-val="dragon monster creature">竜・モンスター</button>
        <button class="opt-btn" data-val="robot android AI character">ロボット・AI</button>
      </div>
      <input class="inline-input" id="extra_f_char" placeholder="その他（例: vampire, angel, demon lord...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">雰囲気</div>
      <div class="btn-group" data-group="f_atm" data-multi="true">
        <button class="opt-btn" data-val="epic grand majestic atmosphere">壮大・叙事詩的</button>
        <button class="opt-btn" data-val="mysterious ethereal magical atmosphere">神秘的</button>
        <button class="opt-btn" data-val="dark grim sinister atmosphere">ダーク</button>
        <button class="opt-btn" data-val="cute charming wholesome atmosphere">かわいい・ほのぼの</button>
      </div>
      <input class="inline-input" id="extra_f_atm" placeholder="その他（例: serene, chaotic, whimsical...）" oninput="buildPrompt()">
    </div>
    <div class="section">
      <div class="section-label">画風</div>
      <div class="btn-group" data-group="f_style" data-multi="true">
        <button class="opt-btn" data-val="digital art style">デジタルアート</button>
        <button class="opt-btn" data-val="anime style illustration">アニメ風</button>
        <button class="opt-btn" data-val="manga style comic illustration">漫画風</button>
        <button class="opt-btn" data-val="video game CG concept art">ゲームCG</button>
        <button class="opt-btn" data-val="children's book illustration style">絵本・イラスト</button>
        <button class="opt-btn" data-val="Alphonse Mucha Art Nouveau style">ミュシャ風</button>
      </div>
      <input class="inline-input" id="extra_f_style" placeholder="その他（例: ukiyo-e, ink wash painting...）" oninput="buildPrompt()">
    </div>
  </div>

  <div class="divider"></div>

  <!-- 品質タグ -->
  <div class="section quality-row">
    <div class="section-label">品質タグ</div>
    <div class="btn-group" data-group="quality" data-multi="true">
      <button class="opt-btn selected" data-val="high quality">高品質</button>
      <button class="opt-btn selected" data-val="detailed">高精細</button>
      <button class="opt-btn" data-val="4K">4K</button>
      <button class="opt-btn" data-val="8K ultra HD">8K</button>
      <button class="opt-btn" data-val="cinematic">映画的</button>
      <button class="opt-btn" data-val="award winning">受賞作品風</button>
      <button class="opt-btn" data-val="trending on artstation">Artstation人気</button>
    </div>
  </div>

  <!-- 自由入力欄 -->
  <div class="section extra-row">
    <div class="section-label extra-label">自由入力（日本語OK・任意）</div>
    <input type="text" class="extra-input" id="extraInput" placeholder="例: 赤いロングヘア、剣を持っている、笑顔..." oninput="buildPrompt()">
  </div>

  <!-- プロンプト出力 -->
  <div class="prompt-area">
    <div class="prompt-label">
      生成プロンプト
      <span>コピーしてGrok / SDに貼り付け</span>
    </div>
    <div class="prompt-text" id="promptOutput">
      <span class="prompt-empty">← 上の選択肢をクリックするとプロンプトが生成されます</span>
    </div>
    <div class="btn-row">
      <button class="action-btn copy-btn" id="copyBtn" onclick="copyPrompt()">📋 コピー</button>
      <button class="action-btn reset-btn" onclick="resetAll()">↺ リセット</button>
    </div>
  </div>

</div>

<script>
var currentTab = 'portrait';

var tabGroups = {
  portrait: ['p_subject','p_age','p_ethnicity','p_outfit','p_action','p_mood','p_feel','p_comp','p_bg','p_light','p_style','p_fx'],
  poster:   ['e_type','e_mood','e_color','e_style','e_person'],
  landscape:['l_place','l_time','l_weather','l_season','l_style'],
  fantasy:  ['f_world','f_char','f_atm','f_style']
};

function switchTab(tab) {
  currentTab = tab;
  ['portrait','poster','landscape','fantasy'].forEach(function(t) {
    document.getElementById('tab-'+t).style.display = (t === tab) ? '' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach(function(btn, i) {
    btn.classList.toggle('active', ['portrait','poster','landscape','fantasy'][i] === tab);
  });
  buildPrompt();
}

function initButtons() {
  document.querySelectorAll('[data-group]').forEach(function(group) {
    group.querySelectorAll('.opt-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        btn.classList.toggle('selected');
        buildPrompt();
      });
    });
  });
}

function getGroupVal(groupName) {
  var group = document.querySelector('[data-group="'+groupName+'"]');
  if (!group) return '';
  var vals = [];
  group.querySelectorAll('.opt-btn.selected').forEach(function(b) {
    if (b.dataset.val) vals.push(b.dataset.val);
  });
  var inlineInput = document.getElementById('extra_'+groupName);
  if (inlineInput && inlineInput.value.trim()) vals.push(inlineInput.value.trim());
  return vals.join(', ');
}

function buildPrompt() {
  var parts = [];
  var groups = tabGroups[currentTab] || [];

  groups.forEach(function(g) {
    var v = getGroupVal(g);
    if (v) parts.push(v);
  });

  var quality = getGroupVal('quality');
  if (quality) parts.push(quality);

  var extra = document.getElementById('extraInput').value.trim();
  if (extra) parts.push(extra);

  var out = document.getElementById('promptOutput');
  if (parts.length === 0) {
    out.innerHTML = '<span class="prompt-empty">← 上の選択肢をクリックするとプロンプトが生成されます</span>';
  } else {
    out.textContent = parts.join(', ');
  }

  var copyBtn = document.getElementById('copyBtn');
  copyBtn.classList.remove('copied');
  copyBtn.textContent = '📋 コピー';
}

function copyPrompt() {
  var out = document.getElementById('promptOutput');
  var text = out.textContent;
  if (!text || text.includes('← ')) return;
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.textContent = '✅ コピー完了！';
    setTimeout(function(){ btn.classList.remove('copied'); btn.textContent = '📋 コピー'; }, 2000);
  });
}

function resetAll() {
  document.querySelectorAll('[data-group]').forEach(function(group) {
    group.querySelectorAll('.opt-btn').forEach(function(btn) {
      btn.classList.remove('selected');
    });
    if (group.dataset.group === 'quality') {
      group.querySelectorAll('.opt-btn').forEach(function(btn) {
        if (btn.dataset.val === 'high quality' || btn.dataset.val === 'detailed') {
          btn.classList.add('selected');
        }
      });
    }
  });
  document.querySelectorAll('.inline-input').forEach(function(el){ el.value = ''; });
  document.getElementById('extraInput').value = '';
  buildPrompt();
}

initButtons();
buildPrompt();
</script>
</body>
</html>
