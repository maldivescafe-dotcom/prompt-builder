<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0a1e;color:#e8e0ff;min-height:100vh;-webkit-text-size-adjust:100%;text-size-adjust:100%}
.header{background:linear-gradient(135deg,#1a0a3e 0%,#2d1060 100%);padding:20px 16px 16px;text-align:center;border-bottom:1px solid #3d2080}
.header h1{font-size:1.4rem;font-weight:700;color:#c9b8ff;letter-spacing:.05em}
.header p{font-size:.78rem;color:#9980cc;margin-top:4px}
.tabs{display:flex;background:#0d0820;border-bottom:1px solid #2d1a5e;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{flex:1;min-width:72px;padding:12px 8px;font-size:.75rem;color:#7060a8;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;font-weight:500}
.tab-btn.active{color:#c9b8ff;border-bottom-color:#8b5cf6;background:#120d2a}
.tab-btn:hover:not(.active){color:#a090d0;background:#110c25}
.main{padding:14px 12px;max-width:640px;margin:0 auto}
.section{margin-bottom:14px}
.section-label{font-size:.72rem;color:#8b7ab8;margin-bottom:6px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.btn-group{display:flex;flex-wrap:wrap;gap:6px}
.opt-btn{padding:6px 12px;font-size:.8rem;border-radius:20px;border:1px solid #3d2a70;background:#1a1040;color:#b0a0e0;cursor:pointer;transition:all .2s;line-height:1.3}
.opt-btn:hover{border-color:#7c3aed;color:#e0d0ff;background:#211355}
.opt-btn.selected{background:#5b21b6;border-color:#8b5cf6;color:#fff;font-weight:600}
.prompt-area{margin-top:18px;background:#0d0820;border:1px solid #3d2a70;border-radius:12px;padding:14px}
.prompt-label{font-size:.72rem;color:#8b7ab8;margin-bottom:8px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.prompt-label span{font-size:.65rem;background:#2d1a5e;padding:2px 7px;border-radius:10px;color:#a090d0;text-transform:none;letter-spacing:0}
.prompt-text{font-size:.85rem;color:#d4c8f8;line-height:1.6;min-height:60px;word-break:break-word;background:#13092e;border-radius:8px;padding:10px 12px;border:1px solid #2d1a5e;font-family:monospace}
.prompt-empty{color:#5a4a80;font-style:italic;font-size:.82rem}
.btn-row{display:flex;gap:8px;margin-top:10px}
.action-btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
.copy-btn{background:linear-gradient(135deg,#6d28d9,#8b5cf6);color:#fff}
.copy-btn:hover{background:linear-gradient(135deg,#5b21b6,#7c3aed)}
.copy-btn.copied{background:linear-gradient(135deg,#065f46,#059669)}
.reset-btn{background:#1e1040;color:#9080c0;border:1px solid #3d2a70;flex:none;padding:10px 16px}
.reset-btn:hover{background:#2d1a5e;color:#c0b0e0}
.extra-row{margin-top:12px}
.extra-input{width:100%;padding:8px 12px;background:#13092e;border:1px solid #2d1a5e;border-radius:8px;color:#d4c8f8;font-size:.82rem;outline:none;transition:border .2s}
.extra-input::placeholder{color:#5a4a80}
.extra-input:focus{border-color:#6d28d9}
.extra-label{font-size:.7rem;color:#7060a8;margin-bottom:4px}
.quality-row{margin-top:14px}
.divider{height:1px;background:#1e1440;margin:14px 0}
</style>
</head>

<script>
var currentTab = 'portrait';

var tabGroups = {
  portrait: ['p_subject','p_mood','p_comp','p_bg','p_light','p_style','p_fx'],
  poster:   ['e_type','e_mood','e_color','e_style','e_person'],
  landscape:['l_place','l_time','l_weather','l_season','l_style'],
  fantasy:  ['f_world','f_char','f_atm','f_style']
};

// シングル選択グループの現在値
var selections = {};

function switchTab(tab) {
  currentTab = tab;
  ['portrait','poster','landscape','fantasy'].forEach(function(t) {
    document.getElementById('tab-'+t).style.display = (t === tab) ? '' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach(function(btn, i) {
    btn.classList.toggle('active', ['portrait','poster','landscape','fantasy'][i] === tab);
  });
  buildPrompt();
}

function initButtons() {
  document.querySelectorAll('[data-group]').forEach(function(group) {
    var groupName = group.dataset.group;
    var isMulti = group.dataset.multi === 'true';
    group.querySelectorAll('.opt-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        if (isMulti) {
          btn.classList.toggle('selected');
        } else {
          group.querySelectorAll('.opt-btn').forEach(function(b){ b.classList.remove('selected'); });
          btn.classList.add('selected');
        }
        buildPrompt();
      });
    });
  });
}

function getGroupVal(groupName) {
  var group = document.querySelector('[data-group="'+groupName+'"]');
  if (!group) return '';
  var isMulti = group.dataset.multi === 'true';
  if (isMulti) {
    var vals = [];
    group.querySelectorAll('.opt-btn.selected').forEach(function(b){ if(b.dataset.val) vals.push(b.dataset.val); });
    return vals.join(', ');
  } else {
    var sel = group.querySelector('.opt-btn.selected');
    return sel ? sel.dataset.val : '';
  }
}

function buildPrompt() {
  var parts = [];
  var groups = tabGroups[currentTab] || [];

  groups.forEach(function(g) {
    var v = getGroupVal(g);
    if (v) parts.push(v);
  });

  var quality = getGroupVal('quality');
  if (quality) parts.push(quality);

  var extra = document.getElementById('extraInput').value.trim();
  if (extra) parts.push(extra);

  var out = document.getElementById('promptOutput');
  if (parts.length === 0) {
    out.innerHTML = '<span class="prompt-empty">← 上の選択肢をクリックするとプロンプトが生成されます</span>';
  } else {
    out.textContent = parts.join(', ');
  }

  var copyBtn = document.getElementById('copyBtn');
  copyBtn.classList.remove('copied');
  copyBtn.textContent = '📋 コピー';
}

function copyPrompt() {
  var out = document.getElementById('promptOutput');
  var text = out.textContent;
  if (!text || text.includes('← ')) return;
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.textContent = '✅ コピー完了！';
    setTimeout(function(){ btn.classList.remove('copied'); btn.textContent = '📋 コピー'; }, 2000);
  });
}

function resetAll() {
  document.querySelectorAll('[data-group]').forEach(function(group) {
    var isMulti = group.dataset.multi === 'true';
    group.querySelectorAll('.opt-btn').forEach(function(btn) {
      btn.classList.remove('selected');
    });
    // 品質タグのデフォルト値を復元
    if (group.dataset.group === 'quality') {
      group.querySelectorAll('.opt-btn').forEach(function(btn) {
        if (btn.dataset.val === 'high quality' || btn.dataset.val === 'detailed') {
          btn.classList.add('selected');
        }
      });
    }
  });
  document.getElementById('extraInput').value = '';
  buildPrompt();
}

initButtons();
buildPrompt();
</script>
</body>
</html>
